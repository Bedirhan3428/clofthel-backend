name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-phone:
    name: Build Phone APK (ARM64)
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: "--max-old-space-size=3072"
      CMAKE_BUILD_PARALLEL_LEVEL: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Expo Prebuild
        run: |
          npx expo prebuild --platform android --no-install --clean
          cp debug.keystore android/app/debug.keystore
          sed -i 's/org.gradle.jvmargs=-Xmx4096m/org.gradle.jvmargs=-Xmx2048m/g' android/gradle.properties
          echo "kotlin.daemon.jvmopts=-Xmx1024m" >> android/gradle.properties

      - name: Build Android Release APK
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m"
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --max-workers=2 -PreactNativeArchitectures=arm64-v8a

      - name: Upload Phone APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-phone-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

  build-emulator:
    name: Build Emulator APK (x86/x86_64)
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: "--max-old-space-size=3072"
      CMAKE_BUILD_PARALLEL_LEVEL: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Expo Prebuild
        run: |
          npx expo prebuild --platform android --no-install --clean
          cp debug.keystore android/app/debug.keystore
          sed -i 's/org.gradle.jvmargs=-Xmx4096m/org.gradle.jvmargs=-Xmx2048m/g' android/gradle.properties
          echo "kotlin.daemon.jvmopts=-Xmx1024m" >> android/gradle.properties

      - name: Build Android Release APK
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m"
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --max-workers=2 -PreactNativeArchitectures=x86,x86_64

      - name: Upload Emulator APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-emulator-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
