name: Scraper Cron Job

on:
  schedule:
    # Günde 5 kez çalışır: 02:00, 08:00, 12:00, 16:00, 20:00 UTC
    # Türkiye saati (UTC+3): 05:00, 11:00, 15:00, 19:00, 23:00
    - cron: '0 2,8,12,16,20 * * *'
  workflow_dispatch: # Manuel tetikleme butonu

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./scraper-service
        run: npm ci

      - name: Run scraper (30 pages)
        working-directory: ./scraper-service
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          MAIN_BACKEND_URL: ${{ secrets.MAIN_BACKEND_URL }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
        run: node run_once.js
